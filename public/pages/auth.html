<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visualize CV | Login</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Poppins:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-animated">
    <main class="centered-container fade-in">
      <section class="auth-card glass-card">
        <h1>Visualize CV</h1>
        <p class="subtitle">Login or register to build and analyze resumes.</p>

        <div class="tabs">
          <button id="loginTab" class="tab active">Login</button>
          <button id="registerTab" class="tab">Register</button>
        </div>

        <form id="authForm" class="form-grid">
          <div id="nameField" class="hidden">
            <label for="name">Full Name</label>
            <input id="name" name="name" placeholder="John Doe" />
          </div>
          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required />
          </div>
          <div>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="********" required />
          </div>
          <button type="submit" class="btn-primary">Continue</button>
        </form>
        <p id="authMessage" class="message"></p>
      </section>
    </main>
    <script src="/js/ui-effects.js"></script>
    <script src="/js/auth.js"></script>
  </body>
</html>
